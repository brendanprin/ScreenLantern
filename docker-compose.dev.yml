name: screenlantern-dev

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: screenlantern
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - screenlantern_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d screenlantern"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/screenlantern?schema=public
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      PORT: "3000"
      SEED_DEMO_DATA: "1"
      SEED_DEMO_MODE: "full"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - screenlantern_dev_node_modules:/app/node_modules
      - screenlantern_dev_next:/app/.next
    command: ["/bin/sh", "./scripts/start-dev.sh"]

volumes:
  screenlantern_dev_postgres_data:
  screenlantern_dev_node_modules:
  screenlantern_dev_next:
