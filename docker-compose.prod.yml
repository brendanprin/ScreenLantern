name: screenlantern-prod

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: screenlantern
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - screenlantern_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d screenlantern"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/screenlantern?schema=public
      NEXTAUTH_URL: http://localhost:3001
      AUTH_TRUST_HOST: "true"
      PORT: "3000"
      SEED_DEMO_DATA: "1"
      SEED_DEMO_MODE: "users-only"
      NODE_ENV: production
      STREAMING_SYNC_URL: http://streaming-sync:7331
    ports:
      - "3001:3000"
    command: ["/bin/sh", "./scripts/start-prod.sh"]

  streaming-sync:
    build:
      context: .
      dockerfile: Dockerfile.netflix-sync
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env
    environment:
      SCREENLANTERN_INTERNAL_URL: http://app:3000
      NETFLIX_SYNC_USER_DATA_DIR: /data/profile
      NETFLIX_SYNC_STORAGE_STATE_PATH: /data/storage-state.json
      NETFLIX_SYNC_DOWNLOAD_DIR: /data/downloads
      NETFLIX_SYNC_HEADLESS: "1"
      STREAMING_SYNC_PORT: "7331"
    volumes:
      - ./.netflix-sync:/data

volumes:
  screenlantern_prod_postgres_data:
